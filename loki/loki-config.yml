# =============================================================================
# Loki Configuration - Observability
# =============================================================================
# Local development config with filesystem storage.
# For production, migrate to S3 backend.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

limits_config:
  retention_period: 168h  # 7 days (dev)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Attributes used to discover service_name from OTLP and Docker logs
  discover_service_name:
    - service_name
    - service
    - app
    - application
    - compose_service
    - container

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

ingester:
  chunk_idle_period: 1h
  max_chunk_age: 2h
  chunk_target_size: 1048576
  wal:
    dir: /loki/wal

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
