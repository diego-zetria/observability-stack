# =============================================================================
# Prometheus Configuration - Observability
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: app-local
    environment: development

rule_files:
  - alert-rules.yml

scrape_configs:
  # --------------------------------------------------------------------------
  # Application Backend - metricas via OTLP (Alloy)
  # O backend NAO expoe /metrics. Traces e metricas vao via OTLP -> Alloy.
  # Span metrics sao geradas pelo Tempo metrics_generator -> Prometheus.
  # --------------------------------------------------------------------------

  # --------------------------------------------------------------------------
  # Netdata - Host/Infrastructure metrics
  # --------------------------------------------------------------------------
  - job_name: 'netdata'
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    honor_labels: true
    static_configs:
      - targets: ['netdata:19999']
        labels:
          service: 'netdata'

  # --------------------------------------------------------------------------
  # PostgreSQL Exporter
  # --------------------------------------------------------------------------
  - job_name: 'postgres-exporter'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'

  # --------------------------------------------------------------------------
  # Redis Exporter
  # --------------------------------------------------------------------------
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # --------------------------------------------------------------------------
  # Grafana Alloy self-monitoring
  # --------------------------------------------------------------------------
  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']
        labels:
          service: 'alloy'

  # --------------------------------------------------------------------------
  # Prometheus self-monitoring
  # --------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
